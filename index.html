<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecycleCheck AI</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons for clean UI elements -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container flex flex-col h-screen">
        <!-- Header -->
        <header class="flex justify-between items-center px-6 py-4 border-b border-gray-100 bg-white sticky top-0 z-30">
            <div class="flex items-center gap-2">
                <i class="ph ph-leaf text-2xl text-emerald-500"></i>
                <h1 class="font-bold text-xl text-gray-800">RecycleCheck AI</h1>
            </div>
            <button class="p-2 rounded-full hover:bg-gray-100 text-gray-500 transition-colors" title="Settings">
                <i class="ph ph-gear text-2xl"></i>
            </button>
        </header>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto pb-32">
            
            <!-- Camera Viewport Section -->
            <section class="camera-viewport" id="cameraSection">
                <!-- Canvas for displaying camera feed -->
                <canvas id="videoCanvas" class="w-full h-full object-cover"></canvas>

                <!-- Flash Overlay -->
                <div id="flashOverlay" class="flash-overlay"></div>

                <!-- Loading Overlay -->
                <div id="loadingOverlay" class="loading-overlay">
                    <div class="mb-4">
                        <div class="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                    </div>
                    <p class="font-semibold tracking-wide">Analyzing waste...</p>
                </div>

                <!-- Fallback UI (Camera Denied) -->
                <div id="cameraFallback" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-gray-800 text-white p-8 text-center">
                    <i class="ph ph-camera-slash text-5xl mb-4 text-gray-400"></i>
                    <h3 class="text-lg font-semibold mb-2">Camera Access Required</h3>
                    <p class="text-sm text-gray-300 mb-6">To identify your waste instantly, please allow camera access or upload an image.</p>
                    
                    <!-- Custom File Upload -->
                    <label class="cursor-pointer bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-3 rounded-lg font-medium transition-colors flex items-center gap-2 shadow-lg">
                        <i class="ph ph-upload-simple"></i>
                        <span>Upload Image</span>
                        <input type="file" id="fileInput" accept="image/*" class="hidden">
                    </label>
                </div>
            </section>

            <!-- Action Button -->
            <section id="scanActionSection" class="flex justify-center mt-[-2rem] relative z-10">
                <div class="relative">
                    <!-- Pulsing ring effect -->
                    <div class="pulse-ring"></div>
                    
                    <button id="scanBtn" class="relative bg-emerald-500 hover:bg-emerald-600 text-white w-20 h-20 rounded-full flex items-center justify-center shadow-lg transition-transform active:scale-95 border-4 border-white">
                        <i class="ph ph-camera text-3xl"></i>
                    </button>
                </div>
            </section>

            <!-- Recent Activity Section -->
            <section class="px-6 mt-10">
                <div class="flex justify-between items-end mb-4">
                    <h2 class="text-lg font-bold text-gray-800">Recent Scans</h2>
                    <button class="text-sm text-emerald-600 font-medium hover:underline">View All</button>
                </div>

                <!-- List Container -->
                <div id="recentList" class="space-y-3">
                    <!-- Empty state for dynamic items -->
                    <div id="emptyRecent" class="py-12 text-center text-gray-400">
                        <i class="ph ph-camera text-4xl mb-2 block opacity-50"></i>
                        <p class="text-sm">No recent scans yet.</p>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
